<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Arte e a Ciência da Tríade Web</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  color: #fff;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

body::before,
body::after {
  content: none;
}

body::before {
  background:
    linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
    linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.24));
  background-size: 3px 100%, 100% 100%;
  opacity: 0.18;
}

body::after {
  background: radial-gradient(ellipse at center, transparent 48%, rgba(0, 0, 0, 0.48) 100%);
}

.background {
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  z-index: 0;
  background:
    radial-gradient(circle at 18% 18%, rgba(255, 107, 53, 0.18), transparent 28%),
    radial-gradient(circle at 78% 20%, rgba(247, 223, 30, 0.15), transparent 25%),
    linear-gradient(180deg, #090b26 0%, #152247 48%, #0b3b4d 100%);
}

.background::before,
.background::after {
  content: none;
}

.background::before {
  background:
    linear-gradient(118deg, transparent 8%, rgba(102, 126, 234, 0.2) 24%, transparent 38%),
    linear-gradient(62deg, transparent 44%, rgba(45, 212, 191, 0.16) 59%, transparent 74%),
    linear-gradient(160deg, transparent 18%, rgba(255, 107, 53, 0.12) 31%, transparent 47%);
  opacity: 0.62;
  animation: auroraDrift 24s ease-in-out infinite alternate;
}

.background::after {
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
  background-size: 70px 70px;
  mask-image: linear-gradient(180deg, transparent, #000 58%, transparent 95%);
  transform: perspective(500px) rotateX(58deg) translateY(130px);
  transform-origin: center bottom;
  opacity: 0.45;
}

@keyframes auroraDrift {
  0% { transform: translate3d(-2%, -1%, 0) scale(1); }
  100% { transform: translate3d(2%, 1%, 0) scale(1.05); }
}

@keyframes gridDrive {
  0% { background-position: 0 0, 0 0; }
  100% { background-position: 0 70px, 70px 0; }
}

.stars {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.72;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

.story-panel {
  position: fixed;
  top: 22px;
  left: 24px;
  width: min(430px, calc(100vw - 108px));
  z-index: 160;
  padding: 14px 16px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 8px;
  background: rgba(6, 12, 28, 0.88);
  box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
  overflow: hidden;
  transform-origin: left top;
}

.story-panel::before {
  content: none;
}

.story-panel.phase-shift {
  animation: none;
}


.story-kicker {
  display: block;
  color: #f7df1e;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.story-title {
  margin-top: 5px;
  color: #fff;
  font-size: 20px;
  line-height: 1.15;
}

.story-summary {
  margin-top: 7px;
  color: rgba(255, 255, 255, 0.78);
  font-size: 13px;
  line-height: 1.45;
}

.story-progress {
  position: relative;
  width: 100%;
  height: 4px;
  margin-top: 12px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.14);
}

.story-progress span {
  display: block;
  width: 10%;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, #ff6b35, #667eea, #f7df1e);
  transition: width 0.45s ease;
}

@keyframes panelSnap {
  0% { transform: translateY(-6px) scale(0.985); border-color: rgba(247, 223, 30, 0.5); }
  100% { transform: translateY(0) scale(1); border-color: rgba(255, 255, 255, 0.18); }
}


.ground {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 150px;
  background: linear-gradient(180deg, #1a472a 0%, #0d2818 50%, #000 100%);
  z-index: 2;
  border-top: 2px solid #2d8659;
}

.ground::before {
  content: "";
  position: absolute;
  top: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, #2d8659, transparent);
}

.path {
  position: fixed;
  bottom: 80px;
  width: 100%;
  height: 60px;
  background: linear-gradient(90deg,
    transparent,
    rgba(100, 150, 200, 0.3) 20%,
    rgba(100, 150, 200, 0.5) 50%,
    rgba(100, 150, 200, 0.3) 80%,
    transparent
  );
  z-index: 1;
  opacity: 0.5;
}

.cinematic-layer {
  display: none;
}

.horizon-line {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 148px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(247, 223, 30, 0.34), rgba(45, 212, 191, 0.32), transparent);
  box-shadow: 0 0 22px rgba(45, 212, 191, 0.45);
  animation: horizonCharge 3.8s ease-in-out infinite;
}

.light-sweep {
  position: absolute;
  left: -25%;
  bottom: 86px;
  width: 32%;
  height: 68vh;
  background: linear-gradient(78deg, transparent, rgba(255, 255, 255, 0.16), transparent);
  transform: skewX(-16deg);
  opacity: 0.28;
  animation: lightSweep 15s ease-in-out infinite;
}

.code-rain {
  position: absolute;
  inset: 0;
  font-family: Consolas, "Courier New", monospace;
  font-size: 12px;
  font-weight: 700;
  color: rgba(255, 255, 255, 0.78);
  text-shadow: 0 0 12px currentColor;
}

.code-fragment {
  position: absolute;
  left: var(--x);
  bottom: var(--y);
  color: var(--color);
  opacity: 0;
  transform: translate3d(-50%, 0, 0) scale(0.7);
  animation: codeLift var(--duration) ease-out forwards;
}

.chapter-flash {
  position: absolute;
  left: 50%;
  bottom: 300px;
  width: 20px;
  height: 20px;
  border: 2px solid rgba(247, 223, 30, 0.65);
  border-radius: 50%;
  transform: translate(-50%, 50%);
  animation: chapterFlash 900ms ease-out forwards;
}

@keyframes horizonCharge {
  0%, 100% { opacity: 0.38; transform: scaleX(0.92); }
  50% { opacity: 1; transform: scaleX(1); }
}

@keyframes lightSweep {
  0%, 15% { transform: translateX(0) skewX(-16deg); opacity: 0; }
  35%, 58% { opacity: 0.38; }
  85%, 100% { transform: translateX(440%) skewX(-16deg); opacity: 0; }
}

@keyframes codeLift {
  0% { opacity: 0; transform: translate3d(-50%, 12px, 0) scale(0.7) rotate(-4deg); }
  15% { opacity: 0.95; }
  100% { opacity: 0; transform: translate3d(calc(-50% + var(--drift)), -58vh, 0) scale(1.08) rotate(8deg); }
}

@keyframes chapterFlash {
  0% { opacity: 0.9; transform: translate(-50%, 50%) scale(0.3); }
  100% { opacity: 0; transform: translate(-50%, 50%) scale(18); }
}

.book-relic {
  position: fixed;
  left: 50%;
  bottom: 245px;
  width: 270px;
  height: 152px;
  z-index: 12;
  pointer-events: none;
  transform: translateX(-50%) rotateX(12deg);
  transform-style: preserve-3d;
  animation: none;
  opacity: 1;
  visibility: visible;
  transition: opacity 0.45s ease, transform 0.45s ease, visibility 0s;
}

.book-relic.book-hidden {
  opacity: 0;
  visibility: hidden;
  transform: translateX(-50%) rotateX(12deg) translateY(-18px) scale(0.86);
  transition: opacity 0.45s ease, transform 0.45s ease, visibility 0s linear 0.45s;
}

.book-relic::before {
  content: "";
  position: absolute;
  left: 50%;
  bottom: -14px;
  width: 245px;
  height: 32px;
  transform: translateX(-50%);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(247, 223, 30, 0.22), transparent 70%);
}

.book-relic.book-active {
  box-shadow: none;
}

.book-relic.book-active .book-aura {
  animation-duration: 2.4s;
}

.book-relic.book-active .book-page-turn {
  animation-duration: 1.4s;
}

.book-aura {
  display: none;
}

.book-aura::before,
.book-aura::after {
  content: "";
  position: absolute;
  inset: 12px 28px;
  border: 1px solid rgba(45, 212, 191, 0.22);
  border-radius: inherit;
}

.book-aura::after {
  inset: 24px 54px;
  border-color: rgba(255, 107, 53, 0.24);
}

.book-spread {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  perspective: 800px;
}

.book-page,
.book-cover {
  position: relative;
  overflow: hidden;
  border: 2px solid rgba(255, 255, 255, 0.28);
  box-shadow: inset 0 0 26px rgba(255, 255, 255, 0.08);
}

.book-cover {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  padding: 12px;
  border-radius: 8px 2px 2px 8px;
  background:
    linear-gradient(145deg, rgba(255, 107, 53, 0.94), rgba(102, 126, 234, 0.92)),
    linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.18), transparent);
  transform: rotateY(10deg);
}

.book-cover::after {
  content: none;
}

.book-page {
  border-radius: 2px 8px 8px 2px;
  background:
    repeating-linear-gradient(180deg, rgba(20, 28, 48, 0.92) 0 10px, rgba(20, 28, 48, 0.82) 10px 12px),
    linear-gradient(145deg, #f7df1e, #fff4a8);
  transform: rotateY(-10deg);
}

.book-page-turn {
  display: none;
}

.book-page::before,
.book-page::after {
  content: "";
  position: absolute;
  left: 18px;
  right: 18px;
  height: 5px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.55);
}

.book-page::before { top: 28px; }
.book-page::after { top: 48px; width: 54%; }

.book-mark {
  position: absolute;
  right: 20px;
  top: 0;
  width: 16px;
  height: 64px;
  background: #ff6b35;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 78%, 0 100%);
  box-shadow: 0 0 14px rgba(255, 107, 53, 0.8);
}

.book-title {
  color: #fff;
  font-size: 16px;
  font-weight: 900;
  line-height: 1.02;
  text-transform: uppercase;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
}

.book-subtitle {
  color: rgba(255, 255, 255, 0.86);
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

@keyframes bookPulse {
  0%, 100% { transform: translateX(-50%) rotateX(12deg) translateY(0) rotateZ(-0.4deg); }

function updateStoryPanel(convIndex) {
  const conv = conversations[convIndex];
  const progress = ((convIndex + 1) / conversations.length) * 100;
  storyKicker.textContent = `Capítulo ${convIndex + 1} de ${conversations.length}`;
  storyTitle.textContent = conv.chapter;
  storySummary.textContent = conv.summary;
  storyProgress.style.width = `${progress}%`;

  clearTimeout(bookHideTimer);

  if (convIndex === 0) {
    bookRelic.classList.remove("book-hidden");
    bookHideTimer = setTimeout(() => {
      bookRelic.classList.add("book-hidden");
    }, 2600);
  } else {
    bookRelic.classList.add("book-hidden");
  }
}

function playBeep(frequency = 400, duration = 100, type = "sine") {
  if (!soundEnabled) return;

  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioContext = new AudioContext();
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);

    oscillator.frequency.value = frequency;
    oscillator.type = type;

    gainNode.gain.setValueAtTime(0.22, audioContext.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);

    oscillator.start(audioContext.currentTime);
    oscillator.stop(audioContext.currentTime + duration / 1000);
  } catch (e) {
    console.log("Audio não disponível");
  }
}

function playCharacterSound(character) {
  const sounds = {
    css: 667,
    html: 540,
    js: 800
  };
  playBeep(sounds[character], 150, "triangle");
}

function generateStars() {
  const container = document.getElementById("stars-container");

  for (let i = 0; i < 32; i++) {
    const star = document.createElement("div");
    star.className = "stars";
    const size = Math.random() > 0.88 ? 3 : Math.random() > 0.55 ? 2 : 1;
    star.style.width = `${size}px`;
    star.style.height = `${size}px`;
    star.style.left = `${Math.random() * 100}%`;
    star.style.top = `${Math.random() * 60}%`;
    star.style.animationDuration = `${Math.random() * 3 + 2}s`;
    star.style.animationDelay = `${Math.random() * 3}s`;
    container.appendChild(star);
  }
}

async function showSpeech(character, text) {
  const charElement = document.getElementById(`char${character.toUpperCase()}`);
  const bubble = charElement.querySelector(".speech-bubble");

  bubble.textContent = text;
  bubble.style.display = "block";
  charElement.classList.add("speaking");
  burstCodeFragments(2, characterColors[character]);

  playCharacterSound(character);

  const duration = Math.min(text.length * 48 + 1200, 5200);

  return new Promise(resolve => {
    setTimeout(() => {
      bubble.style.display = "none";
      charElement.classList.remove("speaking");
      resolve();
    }, duration);
  });
}

async function playConversation(convIndex) {
  if (isPlaying) return;
  isPlaying = true;

  updateStoryPanel(convIndex);
  const conv = conversations[convIndex];

  for (const text of conv.texts) {
    await showSpeech(conv.character, text);
    await new Promise(resolve => setTimeout(resolve, 450));
  }

  isPlaying = false;
}

document.getElementById("soundToggle").addEventListener("click", function(e) {
  soundEnabled = !soundEnabled;
  e.currentTarget.textContent = soundEnabled ? "🔊" : "🔇";
  e.currentTarget.classList.toggle("off", !soundEnabled);
});

document.addEventListener("click", (e) => {
  if (e.target.id === "soundToggle" || isPlaying) return;

  const nextIndex = currentConversationIndex % conversations.length;
  currentConversationIndex++;
  playConversation(nextIndex);
});

async function autoPlay() {
  await new Promise(resolve => setTimeout(resolve, 1400));

  while (true) {
    const convIndex = currentConversationIndex % conversations.length;
    await playConversation(convIndex);
    currentConversationIndex++;
    await new Promise(resolve => setTimeout(resolve, 2200));
  }
}

window.addEventListener("load", () => {
  generateStars();
  updateStoryPanel(0);
  autoPlay();

  console.log("A Arte e a Ciência da Tríade Web começou.");
  console.log("Clique em qualquer lugar para avançar a história quando não houver fala ativa.");
});
